<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captain Dashboard - BNI Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bni-red { background-color: #cf202e; }
        .bni-text-red { color: #cf202e; }
        .card-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
        .modal-anim { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Toast Animation */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-animate { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-32 selection:bg-red-100">

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-6 right-6 z-50 flex flex-col gap-3"></div>

    <nav class="bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-40 backdrop-blur-md bg-white/90">
        <div class="max-w-md mx-auto flex justify-between items-center text-sm">
            <div class="flex items-center gap-2">
                <span class="bni-red text-white font-black px-2 py-1 rounded text-xs select-none">BNI</span>
                <span class="font-extrabold text-slate-800 tracking-tight">MC TRACKER</span>
            </div>
            <button id="logout-btn" class="text-slate-400 hover:text-red-500 font-bold transition-colors">Logout</button>
        </div>
    </nav>

    <section id="captain-view" class="p-4 max-w-md mx-auto">
        <header class="mb-8">
            <div class="flex items-center gap-3 mb-2">
                <div id="user-initials" class="h-10 w-10 bni-red text-white flex items-center justify-center rounded-full font-bold text-sm shadow-sm">C</div>
                <div>
                    <h2 id="captain-name" class="text-sm font-bold text-slate-400 uppercase tracking-wider">Loading Profile...</h2>
                    <h1 class="text-2xl font-extrabold text-slate-900 -mt-0.5">Weekly Roster</h1>
                </div>
            </div>
            
            <div class="flex justify-between items-center bg-white p-3 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Current Meeting</span>
                    <span id="current-date" class="text-sm font-bold text-slate-700 italic">Finding Date...</span>
                </div>
                <span id="team-badge" class="text-[10px] bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full font-black ring-1 ring-blue-100">TEAM ROSTER</span>
            </div>
        </header>

        <!-- Loading State -->
        <div id="loading-container" class="space-y-4 py-10">
            <div class="animate-pulse flex flex-col items-center">
                <div class="h-8 w-8 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                <p class="text-slate-400 font-bold text-sm tracking-wide uppercase">Syncing Team Data</p>
            </div>
        </div>

        <!-- Dynamic Member List -->
        <div id="member-list-container" class="space-y-4 hidden"></div>

        <!-- Bottom Actions -->
        <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-xl border-t border-slate-200 z-30">
            <div class="max-w-md mx-auto">
                <button id="save-attendance-btn" class="w-full bni-red hover:bg-red-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-red-200 transition-all active:scale-[0.98] disabled:bg-slate-300 disabled:shadow-none disabled:cursor-not-allowed">
                    Submit Team Report
                </button>
            </div>
        </div>
    </section>

    <!-- Essential logic script -->
    <script type="module" src="../src/views/captain/dashboard.js"></script>
</body>
</html>
