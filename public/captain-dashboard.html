<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captain Dashboard - BNI MC Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .card-shadow { box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.05); }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bni: {
                            navy: '#0a2540',
                            blue: '#1a4a6f',
                            red: '#cf202e',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen pb-32">

    <!-- Toast UI -->
    <div id="toastContainer" class="fixed top-20 right-4 left-4 z-50 flex flex-col gap-3 pointer-events-none md:left-auto md:w-96"></div>

    <!-- Mobile Header -->
    <header class="bg-gradient-to-br from-slate-900 to-slate-800 text-white sticky top-0 z-40 shadow-xl">
        <div class="max-w-xl mx-auto px-5 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 flex items-center justify-center rounded-xl bg-bni-red font-black text-sm tracking-tighter">
                    BNI
                </div>
                <div>
                    <h1 class="text-sm font-black tracking-wide uppercase" id="team-badge">MY TEAM</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-none">Attendance Hub</p>
                </div>
            </div>
            <button id="logout-btn" class="p-2.5 rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7" />
                </svg>
            </button>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-5 py-8">
        
        <!-- Welcome Section -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h2 class="text-2xl font-black text-slate-900 leading-tight">Hello, <span id="captain-name">Captain</span></h2>
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2 mt-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span id="current-date">Loading date...</span>
                </p>
            </div>
            <div class="h-14 w-14 rounded-2xl bg-slate-200 border-4 border-white shadow-sm flex items-center justify-center font-black text-slate-600 text-xl" id="user-initials">
                -
            </div>
        </div>

        <!-- Instructions Highlight -->
        <div class="bg-blue-600 rounded-3xl p-6 mb-8 text-white shadow-lg shadow-blue-500/20 relative overflow-hidden">
            <svg class="absolute -right-8 -bottom-8 w-32 h-32 text-white/10" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326z"/></svg>
            <h3 class="font-black text-lg mb-1 relative z-10">Mark Weekly Attendance</h3>
            <p class="text-xs font-bold text-blue-100/90 relative z-10">Verify each member and provide reasons for any absentees before submitting.</p>
        </div>

        <!-- Attendance List -->
        <div class="space-y-4">
            <div id="loading-container" class="flex flex-col items-center justify-center py-20 text-center">
                <div class="animate-spin h-8 w-8 text-blue-600 border-4 border-t-transparent rounded-full mb-3"></div>
                <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Syncing Team Data</p>
            </div>

            <div id="member-list-container" class="hidden">
                <!-- Data populated via dashboard.js -->
            </div>
        </div>

    </main>

    <!-- Bottom Bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-slate-100 p-5 z-40">
        <div class="max-w-xl mx-auto">
            <button id="save-attendance-btn" class="w-full bg-rose-600 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl shadow-rose-200 hover:bg-rose-700 active:scale-[0.98] transition-all">
                Submit Team Attendance
            </button>
            <p class="text-[9px] text-center text-slate-400 font-bold uppercase tracking-widest mt-4">Safe secure backup to Cloud Firestore</p>
        </div>
    </div>

    <!-- Script Import -->
    <script type="module" src="../src/views/captain/dashboard.js"></script>
</body>
</html>
