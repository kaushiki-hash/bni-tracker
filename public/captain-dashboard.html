<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captain Dashboard - BNI Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bni-red { background-color: #cf202e; }
        .bni-text-red { color: #cf202e; }
        .card-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-24">

    <nav class="bg-white border-b px-4 py-3 sticky top-0 z-10">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="bni-red text-white font-black px-2 py-1 rounded text-sm">BNI</span>
                <span class="font-bold text-slate-800 tracking-tight">MC Tracker</span>
            </div>
            <button id="logout-btn" class="text-slate-400 text-sm font-medium">Logout</button>
        </div>
    </nav>

    <section id="captain-view" class="p-4 max-w-md mx-auto">
        <header class="mb-6">
            <h1 class="text-2xl font-bold text-slate-900">Weekly Attendance</h1>
            <div class="flex justify-between items-center mt-1">
                <p class="text-slate-500 text-sm" id="current-date">Meeting: Oct 24, 2024</p>
                <span class="text-xs bg-slate-200 text-slate-600 px-2 py-1 rounded-full font-bold" id="team-badge">TEAM GOLD</span>
            </div>
        </header>

        <div id="member-list-container" class="space-y-4">
            <div class="bg-white rounded-2xl p-4 card-shadow border-l-4 border-green-500 member-card" data-member-id="101">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <h3 class="font-bold text-slate-800 text-lg">Johnathan Wick</h3>
                        <p class="text-[10px] uppercase tracking-wider font-bold text-slate-400">Prev Week: <span class="text-green-600">Present</span></p>
                    </div>
                    
                    <div class="inline-flex bg-slate-100 p-1 rounded-xl">
                        <button onclick="toggleAttendance('101', true)" id="btn-p-101" class="px-4 py-1.5 rounded-lg font-bold text-sm transition-all bg-green-500 text-white shadow-sm">P</button>
                        <button onclick="toggleAttendance('101', false)" id="btn-a-101" class="px-4 py-1.5 rounded-lg font-bold text-sm transition-all text-slate-400">A</button>
                    </div>
                </div>

                <div id="absence-logic-101" class="hidden space-y-3 pt-3 border-t border-slate-50 mt-2">
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 uppercase">Reason for Absence</label>
                        <select class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-red-500 outline-none">
                            <option value="">Select a reason...</option>
                            <option value="medical">Medical / Health</option>
                            <option value="business">Business / Travel</option>
                            <option value="personal">Personal / Emergency</option>
                            <option value="unexcused">No Intimation</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="intimation-101" class="w-4 h-4 accent-red-600">
                        <label for="intimation-101" class="text-sm text-slate-600">Prior intimation received?</label>
                    </div>
                </div>
            </div>
            </div>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-slate-200">
            <div class="max-w-md mx-auto">
                <button id="save-attendance-btn" class="w-full bni-red hover:bg-red-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-red-200 transition-all active:scale-[0.98]">
                    Submit Team Attendance
                </button>
            </div>
        </div>
    </section>

    <script>
        // UI Logic for toggling absence fields
        function toggleAttendance(memberId, isPresent) {
            const absenceDiv = document.getElementById(`absence-logic-${memberId}`);
            const btnP = document.getElementById(`btn-p-${memberId}`);
            const btnA = document.getElementById(`btn-a-${memberId}`);
            const card = document.querySelector(`[data-member-id="${memberId}"]`);

            if (isPresent) {
                absenceDiv.classList.add('hidden');
                btnP.className = "px-4 py-1.5 rounded-lg font-bold text-sm transition-all bg-green-500 text-white shadow-sm";
                btnA.className = "px-4 py-1.5 rounded-lg font-bold text-sm transition-all text-slate-400";
                card.classList.replace('border-red-500', 'border-green-500');
            } else {
                absenceDiv.classList.remove('hidden');
                btnP.className = "px-4 py-1.5 rounded-lg font-bold text-sm transition-all text-slate-400";
                btnA.className = "px-4 py-1.5 rounded-lg font-bold text-sm transition-all bg-red-600 text-white shadow-sm";
                card.classList.replace('border-green-500', 'border-red-500');
            }
        }
    </script>
</body>
</html>
