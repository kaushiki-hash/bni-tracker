<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - BNI Attendance Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0d6efd 0%, #00d4ff 100%);
      min-height: 100vh;
    }

    .login-container {
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loading {
      display: none;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="login-container max-w-md w-full">
      <!-- Header Card -->
      <div class="bg-white rounded-t-2xl shadow-lg p-8 text-center">
        <div class="mb-6">
          <div class="inline-block bg-gradient-to-br from-cyan-500 to-blue-600 p-3 rounded-full">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
        </div>
        <h1 class="text-3xl font-bold text-slate-900 mb-2">Admin Portal</h1>
        <p class="text-slate-600">BNI Attendance & Absenteeism Tracker</p>
      </div>

      <!-- Login Form Card -->
      <div class="bg-white rounded-b-2xl shadow-lg p-8">
        <form id="login-form" class="space-y-4">
          <!-- Email -->
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
            <input
              type="email"
              id="email"
              placeholder="admin@example.com"
              required
              class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-colors"
            >
            <span class="text-red-500 text-sm hidden" id="email-error"></span>
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
              class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-colors"
            >
            <span class="text-red-500 text-sm hidden" id="password-error"></span>
          </div>

          <!-- Error message -->
          <div id="error-message" class="hidden bg-red-100 border border-red-300 text-red-700 px-4 py-3 rounded-lg text-sm"></div>

          <!-- Submit Button -->
          <button
            type="submit"
            class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-700 hover:to-blue-700 text-white font-semibold py-3 rounded-lg transition-all duration-300 flex items-center justify-center gap-2"
            id="login-btn"
          >
            <span id="btn-text">Sign In</span>
            <div class="loading" id="btn-spinner">
              <div class="spinner"></div>
            </div>
          </button>
        </form>

        <!-- Demo Credentials -->
        <div class="mt-6 pt-6 border-t border-slate-200">
          <p class="text-xs text-slate-500 text-center mb-2">Demo Admin Account:</p>
          <div class="bg-slate-50 p-3 rounded-lg font-mono text-xs space-y-1">
            <p><span class="text-slate-600">Email:</span> <span class="text-cyan-600">admin@bni.com</span></p>
            <p><span class="text-slate-600">Password:</span> <span class="text-cyan-600">admin123</span></p>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="text-center mt-6 text-white text-sm">
        <p>© 2026 BNI Attendance Tracker. All rights reserved.</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { adminLogin } from '../src/auth/auth.js';

    const loginForm = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    const errorMessage = document.getElementById('error-message');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Clear previous errors
      errorMessage.classList.add('hidden');
      document.getElementById('email-error').classList.add('hidden');
      document.getElementById('password-error').classList.add('hidden');

      // Validation
      if (!email || !password) {
        if (!email) {
          document.getElementById('email-error').textContent = 'Email is required';
          document.getElementById('email-error').classList.remove('hidden');
        }
        if (!password) {
          document.getElementById('password-error').textContent = 'Password is required';
          document.getElementById('password-error').classList.remove('hidden');
        }
        return;
      }

      try {
        loginBtn.disabled = true;
        document.getElementById('btn-text').classList.add('hidden');
        document.getElementById('btn-spinner').classList.add('active');

        const result = await adminLogin(email, password);

        if (result.success) {
          // Show success and redirect
          loginBtn.classList.remove('hover:from-cyan-700', 'hover:to-blue-700');
          loginBtn.classList.add('bg-green-600', 'hover:bg-green-700');
          document.getElementById('btn-text').textContent = 'Redirecting...';
          document.getElementById('btn-text').classList.remove('hidden');
          document.getElementById('btn-spinner').classList.remove('active');

          setTimeout(() => {
            window.location.href = '/admin-dashboard.html';
          }, 1000);
        } else {
          // Show error
          errorMessage.textContent = result.error || 'Login failed. Please try again.';
          errorMessage.classList.remove('hidden');
          loginBtn.disabled = false;
          document.getElementById('btn-text').classList.remove('hidden');
          document.getElementById('btn-spinner').classList.remove('active');
        }
      } catch (error) {
        console.error('Login error:', error);
        errorMessage.textContent = 'An error occurred. Please try again.';
        errorMessage.classList.remove('hidden');
        loginBtn.disabled = false;
        document.getElementById('btn-text').classList.remove('hidden');
        document.getElementById('btn-spinner').classList.remove('active');
      }
    });

    // Check if already logged in
    import { getCurrentUser } from '../src/auth/auth.js';
    
    getCurrentUser().then(user => {
      if (user && user.role === 'admin') {
        window.location.href = '/admin-dashboard.html';
      }
    });
  </script>
</body>
</html>
