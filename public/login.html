<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BNI Attendance Tracker - Login</title>
  <link rel="stylesheet" href="login.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>

<body class="bg-slate-50 antialiased">
  <div class="page-shell">
    <section class="hero-panel">
      <div class="brand-box">
        <span class="brand-mark">BNI</span>
      </div>
      <div class="hero-copy">
        <h1>Welcome Back</h1>
        <p>Sign in to manage attendance, teams, and members for your BNI chapter.</p>
      </div>
    </section>

    <section class="login-panel">
      <div class="login-card">
        <div class="login-heading">
          <div>
            <p class="eyebrow">BNI Attendance Tracker</p>
            <h2>Sign in to your account</h2>
          </div>
        </div>

        <div id="message-box" class="hidden bg-red-600 text-white px-5 py-4 rounded-xl shadow-lg mb-6 text-sm font-semibold transition-all duration-300" role="alert"></div>

        <form id="login-form" class="form-grid" autocomplete="off">
          <label class="input-group">
            <span>Email address</span>
            <input id="email" name="email" type="email" placeholder="admin@bni.com" required autocomplete="off" />
          </label>

          <label class="input-group">
            <span>Password</span>
            <input id="password" name="password" type="password" placeholder="••••••••" required minlength="6"
              autocomplete="new-password" />
          </label>

          <button id="submit-button" type="submit" class="primary-button">
            <span id="button-text">Sign In</span>
            <span id="button-spinner" class="spinner" aria-hidden="true" style="display: none;"></span>
          </button>
        </form>
      </div>

      <div class="support-panel">
        <p class="support-copy">Need help? Contact your chapter administrator if you do not have an account.</p>
      </div>
    </section>
  </div>

  <script type="module">
    import { userLogin } from '../src/auth/auth.js';

    // Anti-autofill & state cleanup
    window.addEventListener('load', () => {
      document.getElementById('email').value = '';
      document.getElementById('password').value = '';
    });

    const loginForm = document.getElementById('login-form');
    const messageBox = document.getElementById('message-box');
    const submitBtn = document.getElementById('submit-button');
    const btnText = document.getElementById('button-text');
    const btnSpinner = document.getElementById('button-spinner');

    function showAlert(message) {
      messageBox.textContent = message;
      messageBox.classList.remove('hidden');
      setTimeout(() => messageBox.classList.add('hidden'), 5000);
    }

    const setLoading = (isLoading) => {
      submitBtn.disabled = isLoading;
      btnText.style.display = isLoading ? 'none' : 'inline';
      btnSpinner.style.display = isLoading ? 'inline-block' : 'none';
      submitBtn.style.opacity = isLoading ? '0.8' : '1';
    };

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageBox.classList.add('hidden');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Please enter both email and password');
        return;
      }

      setLoading(true);

      try {
        const result = await userLogin(email, password);

        if (result.success) {
          const role = result.user.role;
          if (role === 'admin') {
            window.location.href = './admin-dashboard.html';
          } else if (role === 'captain') {
            window.location.href = './captain-dashboard.html';
          } else {
            showAlert('Unauthorized role. Contact support.');
          }
        } else {
          showAlert(result.error);
        }
      } catch (error) {
        console.error('Login error:', error);
        showAlert('Service unavailable. Try again later.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
